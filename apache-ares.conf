<VirtualHost *:8080>
    ServerName dmac.pharmacy.arizona.edu:443
    DocumentRoot /var/www/html

    # ─── OIDC Configuration ───────────────────────────────────
    OIDCProviderMetadataURL https://kc.cyverse.org/auth/realms/CyVerse/.well-known/openid-configuration
    OIDCClientID ${OIDC_CLIENT_ID}
    OIDCClientSecret ${OIDC_CLIENT_SECRET}
    OIDCRedirectURI https://dmac.pharmacy.arizona.edu/Ares/redirect_uri
    OIDCCryptoPassphrase ${OIDC_CRYPTO_PASSPHRASE}
    OIDCScope "openid email profile"

    # Force HTTPS scheme — KEMP does SSL termination, traffic arrives as HTTP
    RequestHeader set X-Forwarded-Proto "https" early
    OIDCXForwardedHeaders X-Forwarded-Proto

    # Pass OIDC claims as HTTP headers (OIDC_CLAIM_email, etc.)
    OIDCPassClaimsAs headers

    # Session management
    OIDCSessionType server-cache
    OIDCCacheType file
    OIDCCacheDir /var/cache/apache2/mod_auth_openidc
    OIDCSessionInactivityTimeout 3600
    OIDCSessionMaxDuration 28800
    OIDCCookiePath /Ares/

    # ─── OIDC callback (must have AuthType for mod_auth_openidc to intercept) ──
    <Location /Ares/redirect_uri>
        AuthType openid-connect
        Require valid-user
    </Location>

    # ─── Authenticated R handler locations ─────────────────────
    <Location /Ares/Home>
        AuthType openid-connect
        Require valid-user
        SetHandler r-handler
        RFileHandler /var/www/Rfiles/AresMaster.r
    </Location>

    <Location /Ares/Develop>
        AuthType openid-connect
        Require valid-user
        SetHandler r-handler
        RFileHandler /var/www/Rfiles/AresDevelop.r
    </Location>

    # ─── Unauthenticated static assets ─────────────────────────
    Alias /AresC /var/www/Ares/Rconstants
    <Directory /var/www/Ares/Rconstants>
        Require all granted
    </Directory>

    Alias /Ares/About /var/www/html/Ares
    <Directory /var/www/html/Ares>
        Require all granted
    </Directory>

    Alias /apps /apponefiles
    <Directory /apponefiles>
        Require all granted
        Options Indexes FollowSymLinks
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/ares-error.log
    CustomLog ${APACHE_LOG_DIR}/ares-access.log combined
</VirtualHost>
